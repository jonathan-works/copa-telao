<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vídeo Fullscreen</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: 0;
}
</style>
</head>
<body>

<iframe
    id="player"
    src="https://www.youtube-nocookie.com/embed/TO9oe67HZOQ?autoplay=1&mute=1&loop=1&playlist=TO9oe67HZOQ&rel=0&playsinline=1"
    title="YouTube video player"
    frameborder="0"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen>
</iframe>

</body>
</html>
